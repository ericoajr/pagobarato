<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Barato - As melhores promoções</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
		:root {
		    --bg: #F6F4EF;
		    --ink: #1C1A17;
		    --card: #FFFFFF;
		    --accent: #FF5A1F;
		}

		body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink); margin: 0; padding: 20px; }

		/* O segredo da organização é este container */
		.wrap { max-width: 1040px; margin: 0 auto; }

		/* Cabeçalho alinhado */
		header { margin-bottom: 30px; }

		/* Grid robusto - aqui está o segredo para não quebrar */
		.lista-promocoes { 
		    display: grid; 
		    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
		    gap: 20px; 
		    margin-top: 20px;
		}

		/* Card compacto e elegante */
		.card-promo { 
		    background: var(--card); 
		    border-radius: 12px; 
		    padding: 16px; 
		    display: flex; 
		    flex-direction: column; 
		    text-decoration: none; 
		    color: var(--ink);
		    border: 1px solid #E7E2D8;
		    transition: transform 0.2s;
		}

		.card-promo:hover { transform: translateY(-5px); border-color: var(--accent); }

		.card-imagem { width: 100%; height: 180px; object-fit: contain; margin-bottom: 10px; }

		.preco-novo { color: var(--accent); font-weight: 800; font-size: 1.25rem; display: block; }

		.tabs-nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
		.tab-btn { padding: 8px 16px; border: 1px solid #ddd; border-radius: 20px; cursor: pointer; background: white; }
		.tab-btn.ativa { background: var(--accent); color: white; border-color: var(--accent); }
    </style>
</head>
<body>

<div class="wrap">
    <h1>Pago Barato</h1>
    <p id="data-atualizacao"></p>

    <select id="filtro-categoria" onchange="filtrarEExibir()">
        <option value="TODAS">Todas as Categorias</option>
        <option value="Cozinha">Cozinha</option>
        <option value="Automotivo">Automotivo</option>
        <option value="Alimentos e Bebidas">Alimentos e Bebidas</option>
    </select>

    <nav id="tabs-nav" class="tabs-nav">
        <button class="tab-btn ativa" data-aba="todas">🏠 Todas</button>
        <button class="tab-btn" data-aba="destaques">⭐ Destaques</button>
        <button class="tab-btn" data-aba="recentes">🕒 Recentes</button>
    </nav>

    <div id="container-promocoes" class="lista-promocoes"></div>
</div>

<script>
    let todasAsOfertas = [];
    let abaAtiva = 'todas';

    async function inicializar() {
        const res = await fetch('./promocoes.json');
        const dados = await res.json();
        todasAsOfertas = dados.ofertas;
        document.getElementById('data-atualizacao').innerText = "Última atualização: " + dados.ultimaAtualizacao;
        filtrarEExibir();
    }

    function filtrarEExibir() {
        const cat = document.getElementById('filtro-categoria').value;
        let lista = [...todasAsOfertas];

        // Filtro Categoria
        if (cat !== 'TODAS') {
            lista = lista.filter(i => i.grupo === cat);
        }

        // Filtro Aba
        if (abaAtiva === 'destaques') {
            lista = lista.filter(i => i.destaque === true);
        } else if (abaAtiva === 'recentes') {
            lista.sort((a, b) => new Date(b.dataOferta.split(' ')[0].split('/').reverse().join('-')) - new Date(a.dataOferta.split(' ')[0].split('/').reverse().join('-')));
            lista = lista.slice(0, 20);
        }

        renderizar(lista);
    }

    function renderizar(lista) {
        const container = document.getElementById('container-promocoes');
        container.innerHTML = '';
        lista.forEach(promo => {
            container.innerHTML += `
                <a href="${promo.linkAfiliado}" class="card-promo" target="_blank">
                    <img src="${promo.imagem}" class="card-imagem">
                    <h3>${promo.titulo}</h3>
                    <div class="preco-novo">R$ ${promo.precoPromocao}</div>
                    <small>${promo.dataOferta}</small>
                </a>
            `;
        });
    }

    document.getElementById('tabs-nav').addEventListener('click', (e) => {
        if (!e.target.classList.contains('tab-btn')) return;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('ativa'));
        e.target.classList.add('ativa');
        abaAtiva = e.target.dataset.aba;
        filtrarEExibir();
    });

    window.addEventListener('DOMContentLoaded', inicializar);
</script>
</body>
</html>
